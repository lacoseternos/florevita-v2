<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloreVita v2 — Laços Eternos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#C8436A;--rose-l:#F5D6E0;--rose-d:#8B1D3C;
  --leaf:#2D6A4F;--leaf-l:#D8F3DC;--leaf-m:#52B788;
  --gold:#B7860F;--gold-l:#FFF0C0;
  --purple:#7C3AED;--purple-l:#EDE9FE;
  --blue:#1E40AF;--blue-l:#DBEAFE;
  --red:#DC2626;--red-l:#FEE2E2;
  --cream:#FAF7F2;--petal:#FDF4F7;
  --ink:#1A0A10;--ink2:#4A2038;--muted:#9E8090;
  --border:rgba(200,67,106,0.15);
  --shadow:0 2px 20px rgba(139,29,60,0.08);
  --r:12px;--rl:18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:14px;min-height:100vh;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A0A10,#3B1125);}
.auth-card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo .flower{font-size:48px;display:block;margin-bottom:8px;}
.auth-logo .name{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);display:block;}
.auth-logo .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;display:block;margin-top:4px;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sb{width:220px;min-height:100vh;background:linear-gradient(180deg,#1A0A10,#3B1125);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s;}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo .flower{font-size:22px;}
.sb-logo .name{font-family:'Playfair Display',serif;font-size:19px;color:#fff;}
.sb-logo .unit-badge{font-size:10px;background:var(--rose);color:#fff;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;}
.sb-sec{padding:10px 0 2px 14px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.25);}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;transition:all .2s;border-left:3px solid transparent;}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{background:rgba(200,67,106,.2);color:#fff;border-left-color:var(--rose);}
.sb-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.sb-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);}
.av{width:30px;height:30px;border-radius:50%;background:var(--rose);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-title{font-family:'Playfair Display',serif;font-size:18px;}
.content{padding:20px;flex:1;}

/* CARDS */
.card{background:#fff;border-radius:var(--rl);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
.card-title{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* METRIC */
.mc{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:16px;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mc.rose::before{background:var(--rose);}
.mc.leaf::before{background:var(--leaf);}
.mc.gold::before{background:var(--gold);}
.mc.purple::before{background:var(--purple);}
.mc.blue::before{background:var(--blue);}
.mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.mc-val{font-size:22px;font-weight:600;color:var(--ink);line-height:1;}
.mc-sub{font-size:10px;color:var(--leaf);margin-top:3px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--rose);color:#fff;}
.btn-primary:hover{background:var(--rose-d);}
.btn-outline{background:transparent;color:var(--rose);border:1px solid var(--rose);}
.btn-outline:hover{background:var(--rose-l);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--cream);}
.btn-green{background:var(--leaf);color:#fff;}
.btn-green:hover{background:#1B4332;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}

/* FORMS */
.fg{margin-bottom:12px;}
.fl{font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:4px;display:block;}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(200,67,106,.1);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;min-height:65px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.cb{display:flex;align-items:center;gap:8px;cursor:pointer;}
.cb input{accent-color:var(--rose);width:16px;height:16px;}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:500;}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--petal);}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.t-rose{background:var(--rose-l);color:var(--rose-d);}
.t-green{background:var(--leaf-l);color:var(--leaf);}
.t-gold{background:var(--gold-l);color:var(--gold);}
.t-purple{background:var(--purple-l);color:var(--purple);}
.t-blue{background:var(--blue-l);color:var(--blue);}
.t-gray{background:#F3F4F6;color:#6B7280;}
.t-red{background:var(--red-l);color:var(--red);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(26,10,16,.5);z-index:200;display:flex;align-items:center;justify-content:center;}
.mo-box{background:#fff;border-radius:24px;padding:24px;max-width:620px;width:94%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.mo-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:18px;}
.mo-foot{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

/* TOAST / ALERT */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--ink);color:#fff;border-radius:var(--r);padding:10px 16px;font-size:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:su .3s ease;max-width:320px;}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.alert{border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;}
.al-warn{background:var(--gold-l);color:var(--gold);border:1px solid rgba(183,134,15,.2);}
.al-ok{background:var(--leaf-l);color:var(--leaf);border:1px solid rgba(45,106,79,.2);}
.al-err{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.15);}
.al-info{background:var(--blue-l);color:var(--blue);border:1px solid rgba(30,64,175,.15);}

/* MISC */
hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
.empty{text-align:center;padding:32px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--rose-l);border-top-color:var(--rose);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.search-box{position:relative;}
.search-box input{padding-left:30px;}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.tabs{display:flex;gap:3px;background:var(--cream);border-radius:10px;padding:3px;border:1px solid var(--border);margin-bottom:14px;}
.tab{flex:1;padding:6px 8px;border-radius:8px;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--muted);text-align:center;transition:all .2s;}
.tab.active{background:#fff;color:var(--rose);box-shadow:var(--shadow);}
.pb{height:6px;border-radius:3px;background:#F3F4F6;overflow:hidden;}
.pf{height:100%;border-radius:3px;}
.notif{background:var(--rose);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;}

/* ALERTS PANEL */
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:8px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;}
.alert-item:hover{border-color:var(--rose);}
.alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* PDV */
.pdv-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.prod-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .2s;text-align:center;}
.prod-card:hover,.prod-card.sel{border-color:var(--rose);box-shadow:0 4px 16px rgba(200,67,106,.12);}
.prod-card.sel{background:var(--petal);}
.prod-img{width:60px;height:60px;border-radius:8px;object-fit:cover;margin:0 auto 5px;}
.cart-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.qb{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--rose);font-size:13px;}
.qb:hover{background:var(--rose-l);}

/* PRODUÇÃO */
.prod-queue-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;transition:all .2s;}
.prod-queue-card:hover{border-color:var(--rose);}
.prod-queue-card.priority{border-left:4px solid var(--red);}
.prod-queue-card.urgent{border-left:4px solid var(--gold);}

/* ENTREGADOR */
.delivery-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.delivery-card.priority{border-left:4px solid var(--red);}

/* IMG UPLOAD */
.img-up{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .2s;}
.img-up:hover{border-color:var(--rose);background:var(--petal);}
.img-prev{width:100%;max-height:160px;object-fit:cover;border-radius:var(--r);}

/* IA CHAT */
.chat-wrap{height:360px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);padding:12px;background:var(--cream);}
.chat-msg{margin-bottom:10px;}
.chat-msg.user{text-align:right;}
.chat-bubble{display:inline-block;padding:8px 12px;border-radius:12px;font-size:12px;max-width:85%;line-height:1.5;}
.chat-msg.user .chat-bubble{background:var(--rose);color:#fff;border-bottom-right-radius:2px;}
.chat-msg.ai .chat-bubble{background:#fff;border:1px solid var(--border);border-bottom-left-radius:2px;}
.chat-input-wrap{display:flex;gap:8px;margin-top:10px;}

/* COMMISSION */
.comm-bar{height:8px;border-radius:4px;background:#F3F4F6;overflow:hidden;margin-top:4px;}
.comm-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--rose),var(--rose-d));}

/* RESPONSIVE */
@media(max-width:768px){
  .sb{transform:translateX(-100%);}
  .sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  .g4,.g3,.g2,.pdv-grid{grid-template-columns:1fr;}
  .mob-btn{display:flex!important;}
}
.mob-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border:none;background:var(--cream);border-radius:8px;cursor:pointer;font-size:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API = 'https://florevita-backend.onrender.com/api';
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';

// ── STATE ────────────────────────────────────────────────────
let S = {
  user: null, token: null, page: 'dashboard',
  clients:[], products:[], orders:[], users:[],
  loading:false, toast:null, sidebarOpen:false,
  alerts:[], chatHistory:[],
  _modal:'', _pdidoFilter:'Todos', _clientSel:null,
  _clientSearch:'', _prodSearch:'', _prodCat:'',
};

// PDV state
let PDV = {
  cart:[], discount:0, payment:'Pix',
  clientId:'', clientName:'', clientPhone:'', clientEmail:'',
  recipient:'', cardMessage:'', notes:'',
  deliveryDate:'', deliveryPeriod:'Manhã', deliveryTime:'',
  street:'', neighborhood:'', number:'', city:'', cep:'',
  reference:'', isCondominium:false, block:'', apt:'',
  type:'Delivery'
};

// ── UTILS ────────────────────────────────────────────────────
const $c = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const $d = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
const ini = n => n ? n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() : '?';
const sc = s => ({'Entregue':'t-green','Em preparo':'t-gold','Saiu p/ entrega':'t-purple','Aguardando':'t-gray','Cancelado':'t-red','Pago':'t-green','Pendente':'t-gold','Pronto':'t-blue','Em Produção':'t-gold'}[s]||'t-gray');
const segc = s => ({'VIP':'t-rose','Recorrente':'t-green','Novo':'t-blue'}[s]||'t-gray');
const rolec = r => ({'Administrador':'t-rose','Gerente':'t-purple','Atendimento':'t-blue','Producao':'t-green','Expedicao':'t-gold','Financeiro':'t-gray','Entregador':'t-blue'}[r]||'t-gray');
const emoji = c => ({'Rosa':'🌹','Buquê':'💐','Orquídea':'🌸','Planta':'🌱','Kit':'🎁','Vaso':'🌿','Flor':'🌺','Coroa':'👑','Cesta':'🧺','Embalagem':'📦','Adicional':'✨'}[c]||'🌸');

// ── API ──────────────────────────────────────────────────────
async function api(method, path, body=null) {
  const opts = {method, headers:{'Content-Type':'application/json',...(S.token?{'Authorization':'Bearer '+S.token}:{})}};
  if(body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API+path, opts);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Erro');
    return data;
  } catch(e) { toast('❌ '+e.message,true); throw e; }
}
const GET = p => api('GET',p);
const POST = (p,b) => api('POST',p,b);
const PUT = (p,b) => api('PUT',p,b);
const PATCH = (p,b) => api('PATCH',p,b);

// ── SESSION ──────────────────────────────────────────────────
function saveSession(token,user){S.token=token;S.user=user;localStorage.setItem('fv2_token',token);localStorage.setItem('fv2_user',JSON.stringify(user));}
function loadSession(){const t=localStorage.getItem('fv2_token'),u=localStorage.getItem('fv2_user');if(t&&u){S.token=t;S.user=JSON.parse(u);return true;}return false;}
function logout(){localStorage.removeItem('fv2_token');localStorage.removeItem('fv2_user');S.user=null;S.token=null;render();}
async function doLogin(email,pass){
  try{S.loading=true;render();
  const d=await POST('/auth/login',{email,password:pass});
  saveSession(d.token,d.user);await loadData();S.loading=false;render();toast('✅ Bem-vinda, '+d.user.name+'!');
  }catch(e){S.loading=false;render();}
}
async function loadData(){
  try{const[c,p,o]=await Promise.all([GET('/clients'),GET('/products'),GET('/orders')]);
  S.clients=c||[];S.products=p||[];S.orders=o||[];}catch(e){console.log(e);}
}
function toast(msg,err=false){S.toast={msg,err};render();setTimeout(()=>{S.toast=null;render();},3500);}
function setPage(p){S.page=p;S.sidebarOpen=false;render();}

// ── CAN ──────────────────────────────────────────────────────
const PERMS = {
  Administrador:['*'],
  Gerente:['dashboard','orders','clients','products','stock','financial','reports','delivery','users','commission'],
  Atendimento:['dashboard','orders','clients','products','pdv'],
  Producao:['orders','production','stock','products'],
  Expedicao:['orders','delivery','production','stock'],
  Financeiro:['financial','reports','orders','commission'],
  Entregador:['delivery']
};
function can(mod){if(!S.user)return false;const p=PERMS[S.user.role]||[];return p.includes('*')||p.includes(mod);}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(!S.user){root.innerHTML=renderLogin();bindLogin();return;}
  root.innerHTML=renderApp();bindApp();
}

// ── LOGIN ────────────────────────────────────────────────────
function renderLogin(){return`
<div class="auth-wrap">
<div class="auth-card">
  <div class="auth-logo">
    <span class="flower">🌺</span>
    <span class="name">Laços Eternos</span>
    <span class="sub">Sistema de Gestão v2</span>
  </div>
  ${S.loading?`<div style="text-align:center;padding:20px"><div class="spin"></div></div>`:`
  <div class="fg"><label class="fl">E-mail</label><input class="fi" id="li-email" type="email" placeholder="seu@email.com"/></div>
  <div class="fg"><label class="fl">Senha</label><input class="fi" id="li-pass" type="password" placeholder="••••••"/></div>
  <button class="btn btn-primary" id="btn-login" style="width:100%;justify-content:center;padding:11px;font-size:14px;margin-top:4px;">Entrar</button>
  <div style="margin-top:16px;padding:12px;background:var(--cream);border-radius:var(--r);font-size:11px;color:var(--muted);">
    <div style="font-weight:600;margin-bottom:6px;color:var(--ink)">Acessos de teste:</div>
    <div>Admin: admin@florevita.com</div>
    <div>Atend. Aleixo: loja1@florevita.com</div>
    <div>Produção: cd@florevita.com</div>
    <div style="margin-top:4px;">Senha: Admin@2025 / Loja1@2025 / Cd@2025</div>
  </div>`}
</div></div>`;}
function bindLogin(){
  document.getElementById('btn-login')?.addEventListener('click',()=>{
    doLogin(document.getElementById('li-email').value, document.getElementById('li-pass').value);
  });
  document.getElementById('li-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
}

// ── APP SHELL ────────────────────────────────────────────────
function renderApp(){
  const nav = [
    {k:'dashboard',l:'Dashboard',i:'📊',m:'dashboard',s:'Principal'},
    {k:'pdv',l:'PDV / Caixa',i:'🛒',m:'pdv',s:'Principal'},
    {k:'pedidos',l:'Pedidos',i:'📋',m:'orders',s:'Principal'},
    {k:'clientes',l:'Clientes',i:'👥',m:'clients',s:'Gestão'},
    {k:'produtos',l:'Produtos',i:'🌹',m:'products',s:'Gestão'},
    {k:'estoque',l:'Estoque',i:'📦',m:'stock',s:'Gestão'},
    {k:'producao',l:'Produção',i:'🌿',m:'production',s:'Operação'},
    {k:'expedicao',l:'Expedição',i:'📤',m:'delivery',s:'Operação'},
    {k:'entregador',l:'Entregador',i:'🚚',m:'delivery',s:'Operação'},
    {k:'financeiro',l:'Financeiro',i:'💰',m:'financial',s:'Financeiro'},
    {k:'comissoes',l:'Comissões',i:'💸',m:'commission',s:'Financeiro'},
    {k:'relatorios',l:'Relatórios',i:'📈',m:'reports',s:'Financeiro'},
    {k:'alertas',l:'Alertas',i:'🔔',m:'dashboard',s:'Sistema'},
    {k:'ia',l:'IA Assistente',i:'🤖',m:'dashboard',s:'Sistema'},
    {k:'usuarios',l:'Usuários',i:'👩‍💼',m:'users',s:'Config'},
    {k:'config',l:'Configurações',i:'⚙️',m:'dashboard',s:'Config'},
  ].filter(n=>can(n.m));

  let lastS='';
  const navHtml = nav.map(n=>{
    let sh='';
    if(n.s!==lastS){lastS=n.s;sh=`<div class="sb-sec">${n.s}</div>`;}

  <div class="mc purple"><div class="mc-label">Valor Estoque</div><div class="mc-val">${$c(S.products.reduce((s,p)=>s+(p.costPrice||0)*(p.stock||0),0))}</div></div>

</div>`;
}

// ── RELATÓRIOS ───────────────────────────────────────────────
function renderRelatorios(){
  const byProd={};
  S.orders.forEach(o=>(o.items||[]).forEach(i=>{
    if(!byProd[i.name])byProd[i.name]={qty:0,rev:0};
    byProd[i.name].qty+=i.qty||1;byProd[i.name].rev+=i.totalPrice||0;
  }));
  const top=Object.entries(byProd).sort((a,b)=>b[1].rev-a[1].rev).slice(0,8);
  return`
<div class="card" style="margin-bottom:16px;">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <select class="fi" style="width:auto"><option>Hoje</option><option>Esta semana</option><option selected>Este mês</option><option>Mês anterior</option><option>Personalizado</option></select>
    ${S.user.role==='Administrador'?`<select class="fi" style="width:auto"><option>Todas as unidades</option><option>Loja Novo Aleixo</option><option>Loja Allegro Mall</option><option>CDLE</option></select>`:''}
    <button class="btn btn-primary btn-sm">Gerar</button>
    <button class="btn btn-ghost btn-sm">📥 PDF</button>
    <button class="btn btn-ghost btn-sm">📊 Excel</button>
  </div>
</div>
<div class="g2">
  <div class="card">
    <div class="card-title">Resumo Geral</div>
    ${[
      ['Total de Pedidos',S.orders.length],
      ['Clientes Cadastrados',S.clients.length],
      ['Produtos Cadastrados',S.products.length],
      ['Pedidos Entregues',S.orders.filter(o=>o.status==='Entregue').length],
      ['Pedidos Cancelados',S.orders.filter(o=>o.status==='Cancelado').length],
      ['Faturamento',`${$c(S.orders.filter(o=>o.status!=='Cancelado').reduce((s,o)=>s+(o.total||0),0))}`],
    ].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;"><span style="color:var(--muted)">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">Produtos Mais Vendidos</div>
    ${top.length===0?`<div class="empty"><p>Sem dados</p></div>`:
    top.map(([n,{qty,rev}])=>`
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
        <span style="font-weight:500">${n}</span>
        <span style="color:var(--muted)">${qty} un · ${$c(rev)}</span>
      </div>
      <div class="pb"><div class="pf" style="width:${Math.min(100,(rev/Math.max(...Object.values(byProd).map(b=>b.rev)))*100)}%;background:var(--rose)"></div></div>
    </div>`).join('')}
  </div>
</div>`;
}

async function saveProduct(editId=null){
  const name=document.getElementById('mp-name')?.value.trim();
  if(!name) return toast('❌ Nome obrigatório');
  const data={name,category:document.getElementById('mp-cat')?.value,costPrice:parseFloat(document.getElementById('mp-cost')?.value)||0,salePrice:parseFloat(document.getElementById('mp-price')?.value)||0,stock:parseInt(document.getElementById('mp-stock')?.value)||0,minStock:parseInt(document.getElementById('mp-minstk')?.value)||5,description:document.getElementById('mp-desc')?.value,productionNotes:document.getElementById('mp-prodnotes')?.value,activeOnSite:document.getElementById('mp-site')?.checked,unit:S.user.unit||'Todas'};
  if(S._prodImg) data.images=[S._prodImg];
  try{
    S.loading=true;S._modal='';S._prodImg=null;render();
    let p;
    if(editId){p=await PUT('/products/'+editId,data);S.products=S.products.map(x=>x._id===editId?p:x);}
    else{p=await POST('/products',data);S.products.unshift(p);}
    S.loading=false;render();toast(editId?'✅ Produto atualizado!':'✅ Produto cadastrado!');
  }catch(e){S.loading=false;render();}
}

async function finalizePDV(){
  if(!PDV.cart.length) return toast('❌ Adicione produtos');
  if(!PDV.clientId&&!PDV.clientName) return toast('❌ Informe o cliente');
  if(PDV.type==='Delivery'&&PDV.isCondominium&&(!PDV.block||!PDV.apt)) return toast('❌ Bloco e apartamento obrigatórios');
  const sub=PDV.cart.reduce((s,i)=>s+i.price*i.qty,0);
  const total=sub-(PDV.discount||0);
  const addr=[PDV.street,PDV.number,PDV.neighborhood,PDV.city,PDV.isCondominium?`Bloco ${PDV.block} Ap ${PDV.apt}`:'',PDV.reference].filter(Boolean).join(', ');
  const data={client:PDV.clientId||undefined,clientName:!PDV.clientId?PDV.clientName:undefined,clientPhone:!PDV.clientId?PDV.clientPhone:undefined,items:PDV.cart.map(i=>({product:i.id,name:i.name,qty:i.qty,unitPrice:i.price,totalPrice:i.price*i.qty})),subtotal:sub,discount:PDV.discount||0,total,payment:PDV.payment,type:PDV.type,scheduledDate:PDV.deliveryDate||undefined,scheduledPeriod:PDV.deliveryPeriod,scheduledTime:PDV.deliveryTime,recipient:PDV.recipient,cardMessage:PDV.cardMessage,notes:PDV.notes,deliveryAddress:addr,deliveryStreet:PDV.street,deliveryNumber:PDV.number,deliveryNeighborhood:PDV.neighborhood,deliveryReference:PDV.reference,isCondominium:PDV.isCondominium,block:PDV.block,apt:PDV.apt,source:'PDV',unit:S.user.unit||'Loja Novo Aleixo'};
  try{
    S.loading=true;render();
    const o=await POST('/orders',data);
    S.orders.unshift(o);
    PDV={cart:[],discount:0,payment:'Pix',clientId:'',clientName:'',clientPhone:'',clientEmail:'',recipient:'',cardMessage:'',notes:'',deliveryDate:'',deliveryPeriod:'Manhã',deliveryTime:'',street:'',neighborhood:'',number:'',city:'',cep:'',reference:'',isCondominium:false,block:'',apt:'',type:'Delivery'};
    S.loading=false;S.page='pedidos';render();toast('✅ Pedido '+o.orderNumber+' criado!');
  }catch(e){S.loading=false;render();}
}

async function advanceOrder(id){
  const o=S.orders.find(x=>x._id===id);if(!o)return;
  const nxt={'Aguardando':'Em preparo','Em preparo':'Pronto','Pronto':'Saiu p/ entrega','Saiu p/ entrega':'Entregue'};
  const ns=nxt[o.status];if(!ns)return toast('Pedido já finalizado');
  try{await PATCH('/orders/'+id+'/status',{status:ns});S.orders=S.orders.map(x=>x._id===id?{...x,status:ns}:x);render();toast('✅ Status: '+ns);}catch(e){}
}

async function sendChat(msg){
  if(!msg.trim())return;
  S.chatHistory=[...S.chatHistory,{role:'user',content:msg}];
  render();scrollChat();
  try{
    const res=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`Você é a IA assistente da FloreVita, sistema de gestão da floricultura Laços Eternos. Você é especialista em floricultura, atendimento ao cliente e uso do sistema FloreVita. Responda sempre em português brasileiro, de forma simpática e profissional. Para sugestões de mensagens de cartão, crie textos bonitos, emocionantes e personalizados. Para dúvidas sobre flores, dê informações precisas sobre cuidados, significados e combinações.`,messages:S.chatHistory.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Desculpe, não consegui responder agora.';
    S.chatHistory=[...S.chatHistory,{role:'assistant',content:reply}];
    document.getElementById('last-suggestion')&&(document.getElementById('last-suggestion').textContent=reply);
  }catch(e){S.chatHistory=[...S.chatHistory,{role:'assistant',content:'Desculpe, estou temporariamente indisponível. Tente novamente em instantes.'}];}
  render();scrollChat();
}

function bindPageActions(){
  // PDV
  if(S.page==='pdv'){
    document.getElementById('pdv-search')?.addEventListener('input',e=>{S._prodSearch=e.target.value;render();});
    document.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{S._prodCat=b.dataset.cat;render();}));
    document.querySelectorAll('[data-pid]').forEach(c=>c.addEventListener('click',()=>{
      const id=c.dataset.pid,p=S.products.find(x=>x._id===id);if(!p)return;
      const ex=PDV.cart.find(i=>i.id===id);
      if(ex)PDV.cart=PDV.cart.map(i=>i.id===id?{...i,qty:i.qty+1}:i);
      else PDV.cart.push({id,name:p.name,price:p.salePrice,qty:1});
      render();
    }));
    document.querySelectorAll('[data-dec]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.dec;PDV.cart=PDV.cart.map(i=>i.id===id?{...i,qty:i.qty-1}:i).filter(i=>i.qty>0);render();}));
    document.querySelectorAll('[data-inc]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.inc;PDV.cart=PDV.cart.map(i=>i.id===id?{...i,qty:i.qty+1}:i);render();}));
    document.querySelectorAll('[data-type]').forEach(b=>b.addEventListener('click',()=>{PDV.type=b.dataset.type;render();}));
    document.getElementById('pdv-condo')?.addEventListener('change',e=>{PDV.isCondominium=e.target.checked;render();});
    ['pdv-client','pdv-cname','pdv-cphone','pdv-recipient','pdv-cardmsg','pdv-notes','pdv-date','pdv-period','pdv-time','pdv-street','pdv-number','pdv-neighborhood','pdv-city','pdv-cep','pdv-ref','pdv-block','pdv-apt','pdv-disc','pdv-pay'].forEach(id=>{
      const el=document.getElementById(id);if(!el)return;
      const map={'pdv-client':'clientId','pdv-cname':'clientName','pdv-cphone':'clientPhone','pdv-recipient':'recipient','pdv-cardmsg':'cardMessage','pdv-notes':'notes','pdv-date':'deliveryDate','pdv-period':'deliveryPeriod','pdv-time':'deliveryTime','pdv-street':'street','pdv-number':'number','pdv-neighborhood':'neighborhood','pdv-city':'city','pdv-cep':'cep','pdv-ref':'reference','pdv-block':'block','pdv-apt':'apt','pdv-disc':'discount','pdv-pay':'payment'};
      const key=map[id];
      el.addEventListener('change',e=>{PDV[key]=key==='discount'?parseFloat(e.target.value)||0:e.target.value;if(key==='deliveryPeriod')render();});
      el.addEventListener('input',e=>{PDV[key]=key==='discount'?parseFloat(e.target.value)||0:e.target.value;});
    });
    document.getElementById('btn-fin')?.addEventListener('click',finalizePDV);
  }
  // Pedidos
  if(S.page==='pedidos'){
    document.querySelectorAll('[data-st]').forEach(b=>b.addEventListener('click',()=>{S._pdidoFilter=b.dataset.st;render();}));
    document.querySelectorAll('[data-adv]').forEach(b=>b.addEventListener('click',()=>advanceOrder(b.dataset.adv)));
    document.getElementById('btn-rel-orders')?.addEventListener('click',async()=>{S.loading=true;render();S.orders=await GET('/orders');S.loading=false;render();});
  }
  // Clientes
  if(S.page==='clientes'){
    document.getElementById('btn-new-cli')?.addEventListener('click',showNewClientModal);
    document.getElementById('cli-search')?.addEventListener('input',e=>{S._clientSearch=e.target.value;render();});
    document.querySelectorAll('[data-cli]').forEach(r=>r.addEventListener('click',()=>{S._clientSel=S.clients.find(c=>c._id===r.dataset.cli);render();}));
    document.getElementById('btn-cli-close')?.addEventListener('click',()=>{S._clientSel=null;render();});
  }
  // Produtos
  if(S.page==='produtos'){
    document.getElementById('btn-new-prod')?.addEventListener('click',()=>showNewProductModal());
    document.getElementById('btn-new-prod2')?.addEventListener('click',()=>showNewProductModal());
    document.getElementById('btn-rel-prods')?.addEventListener('click',async()=>{S.loading=true;render();S.products=await GET('/products');S.loading=false;render();});
    document.querySelectorAll('[data-edit-prod]').forEach(b=>b.addEventListener('click',()=>{const p=S.products.find(x=>x._id===b.dataset.editProd);if(p)showNewProductModal(p);}));
  }
  // Produção
  if(S.page==='producao'){
    document.getElementById('btn-rel-orders')?.addEventListener('click',async()=>{S.loading=true;render();S.orders=await GET('/orders');S.loading=false;render();});
    document.querySelectorAll('[data-prod-start]').forEach(b=>b.addEventListener('click',()=>advanceOrder(b.dataset.prodStart)));
    document.querySelectorAll('[data-prod-done]').forEach(b=>b.addEventListener('click',()=>advanceOrder(b.dataset.prodDone)));
  }
  // Expedição
  if(S.page==='expedicao'){
    document.querySelectorAll('[data-exp]').forEach(b=>b.addEventListener('click',()=>advanceOrder(b.dataset.exp)));
  }
  // Entregador
  if(S.page==='entregador'){
    document.querySelectorAll('[data-confirm]').forEach(b=>b.addEventListener('click',()=>advanceOrder(b.dataset.confirm)));
  }
  // IA
  if(S.page==='ia'){
    document.getElementById('btn-chat-send')?.addEventListener('click',()=>{const el=document.getElementById('chat-input');sendChat(el.value);el.value='';});
    document.getElementById('chat-input')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('btn-chat-send').click();}});
    document.querySelectorAll('.ia-sugg').forEach(b=>b.addEventListener('click',()=>{sendChat(b.dataset.sugg);}));
  }
  // Config
  if(S.page==='config'){
    document.getElementById('btn-test-api')?.addEventListener('click',async()=>{try{const r=await fetch('https://florevita-backend.onrender.com/api/health');const d=await r.json();toast(d.db==='conectado'?'✅ Conectado!':'❌ Problema na conexão');}catch(e){toast('❌ API offline');}});
    document.getElementById('btn-sug')?.addEventListener('click',()=>{toast('💡 Sugestão enviada!');document.getElementById('sug-txt').value='';});
  }
  // Estoque
  if(S.page==='estoque'){
    document.getElementById('btn-stock-entry')?.addEventListener('click',()=>toast('Em breve: entrada de estoque'));
    document.getElementById('btn-new-transfer')?.addEventListener('click',()=>toast('Em breve: transferência entre unidades'));
  }
  // Delivery
  if(S.page==='delivery'||S.page==='entregador'){
    document.getElementById('btn-rel-orders')?.addEventListener('click',async()=>{S.loading=true;render();S.orders=await GET('/orders');S.loading=false;render();});
  }
  // Usuários
  if(S.page==='usuarios'){
    document.getElementById('btn-new-user')?.addEventListener('click',()=>toast('Em breve: cadastro de novo usuário'));
  }
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  if(loadSession()){S.loading=true;render();await loadData();S.loading=false;}
  render();
}
init();
</script>
</body>
</html>
